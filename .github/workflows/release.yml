name: Release

on:
  push:
    tags:
      # Change 'v*' to '*' to trigger on any tag, 
      # or '[0-9]*' to trigger specifically on tags starting with a number.
      - '[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Changed: We now take the raw tag name without stripping 'v'
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update version in RollFor-WotLK.toc
        run: |
          sed -i 's/## Version: @project-version@/## Version: ${{ env.VERSION }}/' RollFor-WotLK.toc
          echo "Updated .toc file:"
          grep "## Version:" RollFor-WotLK.toc

      - name: Commit and push version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add RollFor-WotLK.toc
          git commit -m "chore: Update version to ${{ env.VERSION }}" || echo "No changes to commit"
          git push

      - name: Package and Release
        uses: BigWigsMods/packager@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
