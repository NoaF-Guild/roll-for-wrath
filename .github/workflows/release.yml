name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Update version in .toc file
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          sed -i 's/^Version: .*/Version: $TAG_VERSION/' path/to/your/file.toc

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag: ${{ github.ref }}
          files: |
            path/to/your/package.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
